<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="/css/profile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div id="profile_container">
        <div id="profile_page">
            <div id="profile_circle">
                <li class="fas fa-user" id="profile_user_icon"></li>
                <input type="file" name="" id="profile_upload" accept="image/*">
            </div>
            <p id="profile_para">Upload Profile Pic</p>
            <h1 id="profile_name"></h1>
            <button id="profile_btn_next">Next</button>
        </div>
    </div>

    <!--profile main home page start-->
 <div id="profile_main_home">
    <div id="profile_header">
        <div id="profile_main_circle"></div>
    </div>
    <h1 id="profile_username"></h1>
    <div id="app">
        <div id="contact">
            <i class="fa-solid fa-address-book"></i>
            <p>Contact</p>
        </div>
        <div id="player">
            <i class="fa-solid fa-circle-play"></i>
            <p>Player</p>
        </div>
        <div id="logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            <p id="logout_text">Logout</p>

        </div>
    </div>
    <div id="profile_footer">
        <p>Developed by : SRB software limited</p>
    </div>
 </div>

    <script src="js/profile.js"></script>
</body>

</html>
